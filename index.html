<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="fondo">

    <div class="cuerpo">
        <div id="pantalla">0</div>

        <div class="orden">
            <div class="orden2">
                <button id="borrar_todo" class=" operador">C</button>
                <button id="division" class=" operador">/</button>
                <button id="multiplicacion" class=" operador">*</button>
                <button id="borrar" class=" operador">←</button>
            </div>

            <div class="orden2">
                <button id="siete" class="tecla">7</button>
                <button id="ocho" class="tecla">8</button>
                <button id="nueve" class="tecla">9</button>
                <button id="resta" class=" operador">-</button>
            </div>

            <div class="orden2">
                <button id="cuatro" class="tecla">4</button>
                <button id="cinco" class="tecla">5</button>
                <button id="seis" class="tecla">6</button>
                <button id="suma" class=" operador">+</button>
            </div>

            <div class="orden2">
                <button id="uno" class="tecla">1</button>
                <button id="dos" class="tecla">2</button>
                <button id="tres" class="tecla">3</button>
                <button id="igual" class=" igual">=</button>
            </div>

            <div class="orden2">
                <button id="cero" class="tecla cero">0</button>
                <button id="punto" class="tecla">.</button>
            </div>
        </div>
    </div>

    <script src="js/funciones.js"></script>
</body>
</html>
